<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Smart Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 class="title">🎥 YouTube Smart Search</h1>
        <p class="subtitle">Search only videos (no shorts, no playlists)</p>

        <form id="searchForm">
            <input type="text" id="searchInput" placeholder="Search videos..." required>
            <button type="submit">Search</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
